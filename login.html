<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#eef5ff;
    font-family:Sarabun,Arial,sans-serif;
}

.login-box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#0b5ed7;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.jpg" class="logo">

<h2>ระบบเช็คชื่อสภานักเรียน</h2>

<input
type="text"
id="username"
placeholder="ชื่อผู้ใช้">

<input
type="password"
id="password"
placeholder="รหัสผ่าน">

<button onclick="login()">
เข้าสู่ระบบ
</button>

</div>

<script>

function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(
username === "admin" &&
password === "1234"
){

localStorage.setItem(
"isLogin",
"true"
);

window.location.href =
"index.html";

}
else{

alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");

}

}

</script>

</body>
</html>
